name: iOS

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Install XcodeGen
        run: brew install xcodegen
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: firebase/functions/package-lock.json
      - name: Validate configuration
        run: |
          plutil -lint SarjBul/Resources/Info.plist SarjBul/Resources/PrivacyInfo.xcprivacy SarjBul/Resources/AppConfig.sample.plist
          python3 -m json.tool SarjBul/Resources/design-tokens.json >/dev/null
          python3 -m json.tool database.rules.json >/dev/null
      - name: Validate generated design tokens
        run: |
          python3 Scripts/generate_design_tokens.py
          git diff --exit-code -- SarjBul/Generated/DesignTokens.generated.swift
      - name: Validate Firebase backend
        working-directory: firebase/functions
        run: |
          npm ci --ignore-scripts
          npm run lint
          npm audit --audit-level=moderate
      - name: Core tests
        run: swift test
      - name: Generate project
        run: xcodegen generate
      - name: Build app
        run: >-
          xcodebuild -quiet
          -project SarjBul.xcodeproj
          -scheme SarjBul
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
      - name: UI smoke test
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c 'import json,sys; data=json.load(sys.stdin); print(next(device["udid"] for devices in data["devices"].values() for device in devices if device["name"].startswith("iPhone")))')
          xcodebuild -quiet -project SarjBul.xcodeproj -scheme SarjBul -destination "platform=iOS Simulator,id=$DEVICE_ID" test
