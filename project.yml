name: SarjBul
options:
  bundleIdPrefix: com.ozdemirbaris
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  SarjBulCore:
    path: .
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 12.16.0
targets:
  SarjBul:
    type: application
    platform: iOS
    sources:
      - SarjBul
    resources:
      - SarjBul/Resources
    dependencies:
      - package: SarjBulCore
        product: SarjBulCore
      - package: Firebase
        product: FirebaseAppCheck
      - package: Firebase
        product: FirebaseCrashlytics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ozdemirbaris.sarjbul
        INFOPLIST_FILE: SarjBul/Resources/Info.plist
        ENABLE_PREVIEWS: YES
  SarjBulUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SarjBulUITests
    dependencies:
      - target: SarjBul
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ozdemirbaris.sarjbul.uitests
        TEST_TARGET_NAME: SarjBul
        GENERATE_INFOPLIST_FILE: YES
schemes:
  SarjBul:
    build:
      targets:
        SarjBul: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SarjBulUITests
