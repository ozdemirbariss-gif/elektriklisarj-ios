name: SarjBul
options:
  bundleIdPrefix: com.ozdemirbaris
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  SarjBulCore:
    path: .
targets:
  SarjBul:
    type: application
    platform: iOS
    sources:
      - SarjBul
    resources:
      - SarjBul/Resources
    dependencies:
      - package: SarjBulCore
        product: SarjBulCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ozdemirbaris.sarjbul
        INFOPLIST_FILE: SarjBul/Resources/Info.plist
        ENABLE_PREVIEWS: YES
schemes:
  SarjBul:
    build:
      targets:
        SarjBul: all
    run:
      config: Debug
    test:
      config: Debug
