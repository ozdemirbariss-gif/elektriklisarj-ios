name: SarjBul
options:
  bundleIdPrefix: com.ozdemirbaris
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  SarjBulCore:
    path: .
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 12.16.0
targets:
  SarjBul:
    type: application
    platform: iOS
    sources:
      - SarjBul
    resources:
      - SarjBul/Resources
    dependencies:
      - package: SarjBulCore
        product: SarjBulCore
      - package: Firebase
        product: FirebaseAppCheck
      - package: Firebase
        product: FirebaseCrashlytics
      - target: SarjBulWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ozdemirbaris.sarjbul
        INFOPLIST_FILE: SarjBul/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: SarjBul/SarjBul.entitlements
        ENABLE_PREVIEWS: YES
    preBuildScripts:
      - name: Generate Design Tokens
        script: |
          python3 "$SRCROOT/Scripts/generate_design_tokens.py"
        inputFiles:
          - $(SRCROOT)/SarjBul/Resources/design-tokens.json
          - $(SRCROOT)/Scripts/generate_design_tokens.py
        outputFiles:
          - $(SRCROOT)/SarjBul/Generated/DesignTokens.generated.swift
  SarjBulWidgets:
    type: app-extension
    platform: iOS
    sources:
      - SarjBulWidgets
      - SarjBul/App/ChargingActivityAttributes.swift
      - SarjBul/App/WidgetSnapshot.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ozdemirbaris.sarjbul.widgets
        INFOPLIST_FILE: SarjBulWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: SarjBulWidgets/SarjBulWidgets.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
  SarjBulUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SarjBulUITests
    dependencies:
      - target: SarjBul
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ozdemirbaris.sarjbul.uitests
        TEST_TARGET_NAME: SarjBul
        GENERATE_INFOPLIST_FILE: YES
  SarjBulUnitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SarjBulUnitTests
    dependencies:
      - target: SarjBul
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ozdemirbaris.sarjbul.unittests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  SarjBul:
    build:
      targets:
        SarjBul: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SarjBulUnitTests
        - SarjBulUITests
